name: Spin Up

on:
  workflow_dispatch:
    inputs:
      suffix:
        description: "Resource suffix (leave blank to use repo variable RESOURCE_SUFFIX)"
        required: false
        default: ""

jobs:
  provision-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # workflow_dispatch inputs cannot default to repo variables, so resolve
      # the effective suffix here: explicit input wins, else vars.RESOURCE_SUFFIX.
      - name: Resolve resource suffix
        id: suffix
        shell: pwsh
        run: |
          $suffix = '${{ inputs.suffix }}'
          if ([string]::IsNullOrWhiteSpace($suffix)) {
            $suffix = '${{ vars.RESOURCE_SUFFIX }}'
          }
          if ([string]::IsNullOrWhiteSpace($suffix)) {
            Write-Error 'No suffix provided and repo variable RESOURCE_SUFFIX is not set.'
            exit 1
          }
          "suffix=$suffix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Using suffix: $suffix"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision Azure resources
        shell: pwsh
        run: ./infra/provision.ps1 -Suffix '${{ steps.suffix.outputs.suffix }}'

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Validates the lockfile and catches dependency problems early. The
      # authoritative install happens remotely: provision.ps1 sets
      # SCM_DO_BUILD_DURING_DEPLOYMENT=true so the Linux consumption app runs
      # an Oryx build (npm install) on deploy.
      - name: Install API dependencies
        working-directory: api
        run: npm ci --omit=dev

      - name: Deploy Functions app
        uses: Azure/functions-action@v1
        with:
          app-name: func-telesculpt-${{ steps.suffix.outputs.suffix }}
          package: api
          respect-funcignore: true

      - name: Show deployed URL
        shell: pwsh
        run: |
          $url = "https://func-telesculpt-${{ steps.suffix.outputs.suffix }}.azurewebsites.net"
          Write-Host "Function app: $url"
          Write-Host "API base URL: $url/api"
          Write-Host "Reminder: set repo variable API_BASE_URL to $url/api for the Pages deploy."
